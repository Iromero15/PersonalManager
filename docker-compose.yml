

services:
  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/backend
      - ./frontend:/var/www/frontend
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - db

  db:
    image: mariadb:10.11 # MariaDB tiene excelente soporte ARM64
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wymaq_db
      MYSQL_USER: wymaq_user
      MYSQL_PASSWORD: secretpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: